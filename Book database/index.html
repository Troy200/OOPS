<html>
    <head>
        <title>Book Database</title>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.6.3/css/all.css" />
        <link rel="stylesheet" href="https://bootswatch.com/4/flatly/bootstrap.min.css" />
    </head>

    <body>
        <h1 class="text-center">
            <i class="fas fa-book text-centre"></i>
            Book Database
        </h1>

        <form id="formid" class="container">
            <div class="form-group">
                <label>Name</label>
                <input id="nameimp" class="form-control"></input>
            </div>
            <div class="form-group">
                <label>Author</label>
                <input id="authorimp" class="form-control"></input>
            </div>
            <div class="form-group">
                <label>Date of Release</label>
                <input id="dateimp" class="form-control"></input>
            </div>
            <input class="btn btn-block btn-primary" type="submit">
        </form>

        <table class="table table-striped mt-5 container-fluid text-center">
            <thead class="thead-dark">
                <tr>
                    <th>Name</th>
                    <th>Author</th>
                    <th>Date of Release</th>
                </tr>
            </thead>
            <tbody id="tb"></tbody>
        </table>
        <script src="script.js"></script>
    </body>
</html>
